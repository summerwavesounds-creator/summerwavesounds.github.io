<!DOCTYPE html>
<html>
<head>
  <title>My YouTube Channel</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }
    .container {
      margin-top: 50px;
    }
    iframe {
      margin-top: 20px;
      border-radius: 10px;
    }
    a {
      color: #00aced;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to My Channel</h1>
    <p>Check out my latest video 👇</p>

    <iframe width="560" height="315"
      src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
      frameborder="0" allowfullscreen>
    </iframe>

    <p>
      <a href="https://youtube.com/@yourchannel" target="_blank">
        Visit My YouTube Channel
      </a>
    </p>
  </div>
</body>
</html>
