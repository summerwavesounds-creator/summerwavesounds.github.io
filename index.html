<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Summer Wave Sounds</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes gradient {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      margin-top: 80px;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.9;
    }

    iframe {
      margin-top: 20px;
      border-radius: 12px;
      width: 100%;
      height: 315px;
    }

    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 30px;
      background: #ff6b81;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    a.button:hover {
      background: #ff4757;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 40px;
      font-size: 0.8em;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>🌊 Summer Wave Sounds</h1>
      <p>Feel-good music to lift your mood, anytime.</p>

      <iframe 
        src="https://youtu.be/MO1j68hXVWc?si=ATYiTwqfoRl2MUb_" 
        frameborder="0" 
        allowfullscreen>
      </iframe>

      <br>

      <a class="button" href="https://youtube.com/@summerwavesounds" target="_blank">
        🎧 Visit My Channel
      </a>
    </div>

    <div class="footer">
      © 2026 Summer Wave Sounds
    </div>
  </div>
</body>
</html>
